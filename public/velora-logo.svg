<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="40" y1="10" x2="160" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="30%" stop-color="#F59E0B"/>
      <stop offset="60%" stop-color="#D97706"/>
      <stop offset="85%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="100" y1="20" x2="100" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="40%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Left arm of V -->
  <path d="M30 18 L72 18 L100 80 L80 80 Z" fill="url(#goldGrad)" filter="url(#glow)"/>
  <!-- Right arm of V -->
  <path d="M170 18 L128 18 L100 80 L120 80 Z" fill="url(#goldGrad)" filter="url(#glow)"/>
  <!-- Center diamond/leaf -->
  <path d="M100 28 L110 55 L100 75 L90 55 Z" fill="url(#goldGrad2)"/>
  <!-- Circle arc -->
  <path d="M55 95 Q55 130 100 140 Q145 130 145 95" stroke="url(#goldGrad)" stroke-width="4" fill="none" opacity="0.7"/>
  <!-- Leaf detail -->
  <path d="M100 60 Q106 68 100 76 Q94 68 100 60Z" fill="#FEF3C7" opacity="0.9"/>
</svg>
